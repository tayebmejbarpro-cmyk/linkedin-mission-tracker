name: Daily LinkedIn Remote Job Extract

on:
  schedule:
    # 06:30 UTC daily = 30 min after the freelance pipeline (avoids dedup race)
    - cron: '30 6 * * *'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions UI for testing

env:
  PYTHON_VERSION: '3.11'

jobs:
  extract:
    name: Extract Remote Jobs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: APIFY_API_TOKEN  # GitHub environment where secrets are stored

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run remote job extraction pipeline
        env:
          RUN_MODE: job
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          BEREACH_API_TOKEN: ${{ secrets.BEREACH_API_TOKEN }}
        run: python run.py

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: remote-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30

      - name: Upload raw scraped data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: remote-data-${{ github.run_id }}
          path: data/
          retention-days: 7
